<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoveChoice Services</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body data-page="services">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/static/index.html" aria-label="LoveChoice">
          <span class="brand-mark">LC</span>
          <span>
            <strong>LoveChoice</strong>
            <small>Voice Console</small>
          </span>
        </a>

        <nav class="nav-tabs" aria-label="主导航">
          <a href="/static/index.html"><i data-lucide="messages-square"></i>对话</a>
          <a class="active" href="/static/services.html"><i data-lucide="activity"></i>服务</a>
          <a href="/static/settings.html"><i data-lucide="settings-2"></i>配置</a>
          <a href="#logs-asr"><i data-lucide="scroll-text"></i>日志</a>
          <a href="/static/settings.html#memory"><i data-lucide="brain"></i>记忆</a>
        </nav>

        <div class="topbar-status">
          <span class="status-pill" id="systemState">静态预览</span>
        </div>
      </header>

      <main class="ops-page">
        <section class="page-head">
          <div>
            <p class="eyebrow">Service Orchestration</p>
            <h1>ASR → LLM → TTS 编排面板</h1>
          </div>
          <div class="head-actions">
            <button class="primary-action" id="startAllBtn" type="button">
              <i data-lucide="power"></i>
              一键启动
            </button>
            <button class="secondary-action" id="stopAllBtn" type="button">
              <i data-lucide="square"></i>
              停止全部
            </button>
            <button class="secondary-action" id="restartAllBtn" type="button">
              <i data-lucide="refresh-ccw"></i>
              重启全部
            </button>
            <button class="secondary-action" id="clearAllLogsBtn" type="button">
              <i data-lucide="trash-2"></i>
              清空日志
            </button>
            <button class="icon-button" id="healthBtn" type="button" title="刷新状态">
              <i data-lucide="refresh-cw"></i>
            </button>
          </div>
        </section>

        <section class="pipeline-overview">
          <div class="pipeline-node">
            <span>01</span>
            <strong>ASR</strong>
            <small>浏览器语音转文本</small>
          </div>
          <i data-lucide="arrow-right"></i>
          <div class="pipeline-node">
            <span>02</span>
            <strong>LLM</strong>
            <small>OpenAI 兼容推理</small>
          </div>
          <i data-lucide="arrow-right"></i>
          <div class="pipeline-node">
            <span>03</span>
            <strong>TTS</strong>
            <small>流式语音合成</small>
          </div>
        </section>

        <section class="services-layout">
          <div class="service-list" id="serviceCards"></div>

          <aside class="logs-panel" id="logs-asr">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Live Logs</p>
                <h2>运行日志</h2>
              </div>
              <div class="inline-actions">
                <button class="icon-button" id="refreshLogsBtn" type="button" title="刷新日志">
                  <i data-lucide="rotate-cw"></i>
                </button>
                <button class="icon-button" id="copyLogBtn" type="button" title="复制日志">
                  <i data-lucide="copy"></i>
                </button>
                <button class="icon-button" id="downloadLogBtn" type="button" title="下载日志">
                  <i data-lucide="download"></i>
                </button>
              </div>
            </div>
            <div class="log-tabs" id="logTabs"></div>
            <pre class="log-viewer" id="logOutput">选择一个服务查看日志。</pre>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
